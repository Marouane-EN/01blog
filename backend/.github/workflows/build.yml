name: Spring Boot CI

# This tells the robot WHEN to run
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab your code from the repository
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Install Java 17 on the robot's server
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Give the robot permission to run Maven
    - name: Make mvnw executable
      run: chmod +x ./mvnw

    # 4. Command the robot to compile and test your app!
    - name: Build with Maven
      run: ./mvnw clean package -DskipTests 
      # (Note: We skip tests temporarily until we configure a test database later)