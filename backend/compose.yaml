services:
  postgres-db:
    image: postgres:15-alpine
    container_name: 01blog_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123**
      POSTGRES_DB: blog_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: