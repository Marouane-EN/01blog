spring.application.name=backend
# Connect to PostgreSQL running on your local machine
spring.datasource.url=jdbc:postgresql://localhost:5432/01blog_db
spring.datasource.username=postgres
spring.datasource.password=your_password_here

# Tell Hibernate (JPA) to automatically create/update your tables based on your Java code!
spring.jpa.hibernate.ddl-auto=update

# Show the SQL queries in the terminal so you can see what it is doing behind the scenes
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Google OAuth2 Credentials
spring.security.oauth2.client.registration.google.client-id=your-google-client-id
spring.security.oauth2.client.registration.google.client-secret=your-google-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email

# GitHub OAuth2 Credentials
spring.security.oauth2.client.registration.github.client-id=your-github-client-id
spring.security.oauth2.client.registration.github.client-secret=your-github-client-secret
spring.security.oauth2.client.registration.github.scope=user:email,read:user