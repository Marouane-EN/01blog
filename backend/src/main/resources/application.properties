spring.application.name=backend

# 1. TELL SPRING TO LOAD THE HIDDEN SECRET FILE
spring.profiles.include=secret

# 2. DATABASE
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 3. HIBERNATE SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. GOOGLE OAUTH2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# 5. GITHUB OAUTH2
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# 6. JWT Configuration
# This is a random 256-bit hex key.
application.security.jwt.secret-key=${JWT_SECRET_KEY}
# Token expiration time in milliseconds (86400000 = 1 day)
application.security.jwt.expiration=${JWT_EXPIRATION}

# 7. ADMIN CREDENTIALS
application.admin.username=${ADMIN_USERNAME}
application.admin.password=${ADMIN_PASSWORD}
application.admin.email=${ADMIN_EMAIL}

# Max size for a single file (e.g., 2MB for a profile pic)
spring.servlet.multipart.max-file-size=2MB
# Max size for an entire request (if they upload multiple files)
spring.servlet.multipart.max-request-size=2MB